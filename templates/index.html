<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Router — Device Discovery</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body {
    background-color: #141417;
    color: #d8d8d8;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
  }

  .navbar {
    background-color: #1c1c20;
    border-bottom: 1px solid #2a2a2e;
    padding: 10px 24px;
  }
  .navbar-brand { color: #fff; font-weight: 600; font-size: 18px; }
  .navbar-brand span { color: #adb5bd; }

  .status-badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid #3a3a3f;
    color: #6c757d;
  }
  .status-badge.online { border-color: #3a7a3a; color: #6abf6a; }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    margin-right: 5px;
  }

  .page-title { font-size: 22px; font-weight: 600; color: #e8e8e8; margin-bottom: 2px; }
  .page-sub   { font-size: 12px; color: #6c757d; font-family: monospace; }

  /* Metric cards */
  .metric-card {
    background: #1c1c20;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    padding: 16px 20px;
    height: 100%;
  }
  .metric-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6c757d;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .metric-value { font-size: 28px; font-weight: 600; font-family: monospace; color: #d8d8d8; }

  /* Main card / table wrapper */
  .card {
    border: 1px solid #2a2a2e !important;
    border-radius: 8px !important;
    background: #1c1c20 !important;
    box-shadow: none !important;
  }
  .card-header {
    background: #1c1c20 !important;
    border-bottom: 1px solid #2a2a2e !important;
    padding: 12px 16px;
    font-weight: 600;
    color: #d8d8d8;
    border-radius: 8px 8px 0 0 !important;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Table — override ALL bootstrap defaults */
  .table { font-size: 13px; margin-bottom: 0; --bs-table-bg: transparent; --bs-table-border-color: #2a2a2e; --bs-table-striped-bg: transparent; --bs-table-hover-bg: #222226; }
  .table thead th {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6c757d;
    font-weight: 600;
    border-bottom: 1px solid #2a2a2e !important;
    border-top: none !important;
    padding: 10px 14px;
    background: #1c1c20;
  }
  .table tbody tr { background-color: #1c1c20; }
  .table tbody tr:hover { background-color: #222226; }
  .table tbody td {
    padding: 10px 14px;
    vertical-align: middle;
    color: #d0d0d0;
    border-bottom: 1px solid #2a2a2e;
    border-top: none;
    background: transparent;
  }
  .table tbody tr:last-child td { border-bottom: none; }
  .table-responsive { border-radius: 0 0 8px 8px; background: #1c1c20; }

  /* Empty state — no white box, blends in */
  .empty-state {
    text-align: center;
    padding: 48px;
    color: #555;
    background: #1c1c20;
  }
  .empty-state .icon { font-size: 28px; margin-bottom: 8px; }

  .device-name { font-weight: 500; color: #e0e0e0; }
  .device-name.unnamed { color: #555; font-style: italic; font-weight: 400; }
  .mac-addr { font-family: monospace; font-size: 11px; color: #6c757d; }
  .ip-addr  { font-family: monospace; font-size: 12px; color: #7eb8d4; }

  .online-dot  { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4a9e4a; }
  .blocked-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #9e4a4a; }

  .vendor-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: #252528; color: #adb5bd; font-family: monospace;
    border: 1px solid #2a2a2e;
  }

  /* Buttons */
  .btn-scan {
    background-color: #2a2a2e;
    color: #d8d8d8;
    border: 1px solid #3a3a3f;
    font-size: 13px;
    padding: 7px 16px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-scan:hover { background-color: #333338; color: #fff; border-color: #555; }
  .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-outline-secondary {
    color: #adb5bd !important;
    border-color: #3a3a3f !important;
    font-size: 13px;
    background: transparent !important;
    white-space: nowrap;
  }
  .btn-outline-secondary:hover { background: #2a2a2e !important; color: #d8d8d8 !important; }

  .search-input {
    font-size: 13px;
    border: 1px solid #2a2a2e;
    border-radius: 6px;
    padding: 7px 12px;
    outline: none;
    width: 100%;
    background: #1c1c20;
    color: #d8d8d8;
  }
  .search-input:focus { border-color: #555; }
  .search-input::placeholder { color: #555; }

  .icon-btn {
    width: 30px; height: 30px;
    border: 1px solid #2a2a2e;
    border-radius: 5px;
    background: #252528;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #6c757d;
    font-size: 14px;
    transition: all .15s;
  }
  .icon-btn:hover { background: #2e2e33; color: #d8d8d8; border-color: #555; }
  .icon-btn.block-btn:hover { border-color: #7a3a3a; color: #c97070; }

  .last-scan { font-size: 12px; color: #555; font-family: monospace; }

  /* Modal */
  .modal-content { background: #1c1c20 !important; border: 1px solid #2a2a2e !important; border-radius: 8px !important; }
  .modal-header { background: #1c1c20 !important; border-bottom: 1px solid #2a2a2e !important; color: #e0e0e0; border-radius: 8px 8px 0 0 !important; }
  .modal-body   { background: #1c1c20 !important; }
  .modal-footer { background: #1c1c20 !important; border-top: 1px solid #2a2a2e !important; }
  .modal-title  { font-size: 15px; font-weight: 600; color: #e0e0e0; }
  .btn-close    { filter: invert(0.6); }
  .form-label   { font-size: 12px; font-weight: 500; color: #adb5bd; }
  .form-control {
    font-size: 13px; border-radius: 6px;
    background: #141417 !important; border: 1px solid #2a2a2e !important;
    color: #d8d8d8 !important;
  }
  .form-control:focus { border-color: #555 !important; box-shadow: none !important; }
  .form-control::placeholder { color: #555; }

  .btn-primary   { background-color: #2d5a8e !important; border-color: #2d5a8e !important; font-size: 13px; }
  .btn-secondary { background-color: #2a2a2e !important; border-color: #3a3a3f !important; color: #adb5bd !important; font-size: 13px; }

  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
  .toast { font-size: 13px; min-width: 220px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 0.7s linear infinite; }
  tr.blocked-row { opacity: 0.4; }
</style>
</head>
<body>

<nav class="navbar mb-4">
  <span class="navbar-brand">Smart<span>Router</span></span>
  <div class="d-flex align-items-center gap-3">
    <div class="d-flex gap-1">
      <a href="/" style="font-size:13px;padding:4px 12px;border-radius:5px;background:#2a2a2e;color:#fff;text-decoration:none;">Devices</a>
      <a href="/capture" style="font-size:13px;padding:4px 12px;border-radius:5px;color:#adb5bd;text-decoration:none;">Capture</a>
    </div>
    <span class="status-badge" id="hotspot-badge"><span class="status-dot"></span><span id="hotspot-text">Hotspot inactive</span></span>
    <button id="toggle-btn" onclick="toggleHotspot()" style="font-size:12px;padding:4px 12px;border-radius:6px;border:1px solid #3a3a3f;background:#2a2a2e;color:#d8d8d8;cursor:pointer;">Turn On</button>
  </div>
</nav>

<div class="container-fluid px-4" style="max-width: 1100px;">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <div class="page-title">Device Discovery</div>
      <div class="page-sub" id="network-label">network: 192.168.137.0/24</div>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-3">
      <div class="metric-card">
        <div class="metric-label">Total Devices</div>
        <div class="metric-value" style="color:#198754" id="m-total">—</div>
      </div>
    </div>
    <div class="col-3">
      <div class="metric-card">
        <div class="metric-label">Online Now</div>
        <div class="metric-value" id="m-online">—</div>
      </div>
    </div>
    <div class="col-3">
      <div class="metric-card">
        <div class="metric-label">Blocked</div>
        <div class="metric-value" style="color:#dc3545" id="m-blocked">—</div>
      </div>
    </div>
    <div class="col-3">
      <div class="metric-card">
        <div class="metric-label">Unknown Vendor</div>
        <div class="metric-value" style="color:#fd7e14" id="m-unknown">—</div>
      </div>
    </div>
  </div>

  <div class="d-flex align-items-center gap-2 mb-2">
    <input type="text" class="search-input" id="search-input"
           placeholder="Search by name, IP, MAC, vendor…" oninput="filterTable()">
    <button class="btn-scan" id="scan-btn" onclick="triggerScan()">
      <span id="scan-icon">&#9711;</span> Scan Network
    </button>
  </div>
  <div class="last-scan mb-3">Last scan: <span id="last-scan-time">never</span></div>

  <div class="card">
    <div class="card-header">
      <span>Connected IoT Devices</span>
      <span id="device-count" class="text-muted" style="font-size:12px;font-weight:400;"></span>
    </div>
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th style="width:28px"></th>
            <th>Device</th>
            <th>IPv4</th>
            <th>IPv6</th>
            <th>Vendor</th>
            <th>First Seen</th>
            <th>Last Seen</th>
            <th style="width:80px">Actions</th>
          </tr>
        </thead>
        <tbody id="device-tbody">
          <tr><td colspan="8">
            <div class="empty-state">
              <div class="icon">&#9711;</div>
              <div>No devices yet — run a scan</div>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:8px;border:none;">
      <div class="modal-header">
        <h5 class="modal-title">Edit Device — <span id="modal-mac-label" style="font-family:monospace;font-size:13px;"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-mac">
        <div class="mb-3">
          <label class="form-label">Device Name</label>
          <input class="form-control" id="edit-name" placeholder="e.g. Smart Thermostat">
        </div>
        <div class="mb-3">
          <label class="form-label">Model</label>
          <input class="form-control" id="edit-model" placeholder="e.g. Nest Learning 3rd Gen">
        </div>
        <div class="mb-3">
          <label class="form-label">IPv6 Address</label>
          <input class="form-control" id="edit-ipv6" placeholder="fe80::…">
        </div>
        <div class="mb-3">
          <label class="form-label">Description / Notes</label>
          <input class="form-control" id="edit-desc" placeholder="e.g. Living room thermostat">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveDevice()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container">
  <div id="toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allDevices  = [];
let hotspotActive = false;
const editModal = new bootstrap.Modal(document.getElementById('editModal'));
const toastEl   = new bootstrap.Toast(document.getElementById('toast'), { delay: 2500 });

// hotspot toggle
function toggleHotspot() {
  hotspotActive = !hotspotActive;
  const badge  = document.getElementById('hotspot-badge');
  const text   = document.getElementById('hotspot-text');
  const btn    = document.getElementById('toggle-btn');
  const scanBtn = document.getElementById('scan-btn');
  if (hotspotActive) {
    badge.classList.add('online');
    text.textContent  = 'Hotspot active';
    btn.textContent   = 'Turn Off';
    btn.style.borderColor = '#3a7a3a';
    btn.style.color   = '#6abf6a';
    scanBtn.disabled  = false;
    scanBtn.title     = '';
  } else {
    badge.classList.remove('online');
    text.textContent  = 'Hotspot inactive';
    btn.textContent   = 'Turn On';
    btn.style.borderColor = '#3a3a3f';
    btn.style.color   = '#d8d8d8';
    scanBtn.disabled  = true;
    scanBtn.title     = 'Mark hotspot as active first';
    clearTable();
  }
}

function clearTable() {
  allDevices = [];
  document.getElementById('device-tbody').innerHTML =
    `<tr><td colspan="8"><div class="empty-state"><div class="icon">&#9711;</div><div>No devices yet — run a scan</div></div></td></tr>`;
  document.getElementById('device-count').textContent = '';
  document.getElementById('m-total').textContent   = '—';
  document.getElementById('m-online').textContent  = '—';
  document.getElementById('m-blocked').textContent = '—';
  document.getElementById('m-unknown').textContent = '—';
  document.getElementById('last-scan-time').textContent = 'never';
}

// load devices after scan
async function loadDevices() {
  try {
    const res = await fetch('/api/devices');
    allDevices = await res.json();
    renderTable(allDevices);
    updateMetrics(allDevices);
  } catch(e) {
    showToast('Failed to load devices', 'danger');
  }
}

// trigger network scan
async function triggerScan() {
  if (!hotspotActive) {
    showToast('Mark hotspot as active first', 'warning');
    return;
  }
  const btn  = document.getElementById('scan-btn');
  const icon = document.getElementById('scan-icon');
  btn.disabled = true;
  icon.innerHTML = '<span class="spin">&#8635;</span>';
  try {
    const res  = await fetch('/api/devices/scan', { method: 'POST' });
    const data = await res.json();
    if (data.status === 'ok') {
      await loadDevices();
      document.getElementById('last-scan-time').textContent = new Date().toLocaleTimeString();
      showToast(`Scan complete — ${data.found} device(s) found`, 'success');
    } else {
      showToast(data.message || 'Scan failed', 'danger');
    }
  } catch(e) {
    showToast('Scan request failed', 'danger');
  } finally {
    btn.disabled = false;
    icon.innerHTML = '&#9711;';
  }
}

// render device rows in table
function renderTable(devices) {
  const tbody = document.getElementById('device-tbody');
  document.getElementById('device-count').textContent = devices.length ? `${devices.length} device(s)` : '';
  if (!devices.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><div class="icon">&#9711;</div><div>No devices found</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = devices.map(d => {
    const dot      = d.is_blocked ? '<span class="blocked-dot"></span>' : '<span class="online-dot"></span>';
    const nameHtml = d.name
      ? `<div class="device-name">${esc(d.name)}</div>`
      : `<div class="device-name unnamed">Unnamed device</div>`;
    const modelHtml = d.model ? `<div style="font-size:11px;color:#555">${esc(d.model)}</div>` : '';
    const ipv6   = d.ipv6 || '<span style="color:#555">—</span>';
    const vendor = d.vendor && d.vendor !== 'Unknown'
      ? `<span class="vendor-badge">${esc(d.vendor)}</span>`
      : `<span style="color:#b87333;font-size:12px">Unknown</span>`;
    const fs = d.first_seen ? d.first_seen.replace('T',' ') : '—';
    const ls = d.last_seen  ? d.last_seen.replace('T',' ')  : '—';
    return `<tr class="${d.is_blocked ? 'blocked-row' : ''}">
      <td>${dot}</td>
      <td>${nameHtml}${modelHtml}<div class="mac-addr">${esc(d.mac)}</div></td>
      <td><span class="ip-addr">${esc(d.ipv4 || '—')}</span></td>
      <td><span style="font-family:monospace;font-size:11px;color:#555">${ipv6}</span></td>
      <td>${vendor}</td>
      <td style="font-family:monospace;font-size:11px;color:#555">${fs}</td>
      <td style="font-family:monospace;font-size:11px;color:#555">${ls}</td>
      <td>
        <div class="d-flex gap-1">
          <button class="icon-btn" title="Edit device" onclick="openEdit('${esc(d.mac)}')">&#9998;</button>
          <button class="icon-btn block-btn" title="${d.is_blocked ? 'Unblock' : 'Block'}" onclick="toggleBlock('${esc(d.mac)}')">&#8856;</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// filter table by search input
function filterTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  if (!q) { renderTable(allDevices); return; }
  renderTable(allDevices.filter(d =>
    (d.name   ||'').toLowerCase().includes(q) ||
    (d.mac    ||'').toLowerCase().includes(q) ||
    (d.ipv4   ||'').toLowerCase().includes(q) ||
    (d.vendor ||'').toLowerCase().includes(q) ||
    (d.model  ||'').toLowerCase().includes(q)
  ));
}

// update metric cards
function updateMetrics(devices) {
  document.getElementById('m-total').textContent   = devices.length;
  document.getElementById('m-online').textContent  = devices.filter(d => !d.is_blocked).length;
  document.getElementById('m-blocked').textContent = devices.filter(d =>  d.is_blocked).length;
  document.getElementById('m-unknown').textContent = devices.filter(d => !d.vendor || d.vendor === 'Unknown').length;
}

// open edit modal for a device
function openEdit(mac) {
  const d = allDevices.find(x => x.mac === mac);
  if (!d) return;
  document.getElementById('edit-mac').value              = d.mac;
  document.getElementById('modal-mac-label').textContent = d.mac;
  document.getElementById('edit-name').value             = d.name        || '';
  document.getElementById('edit-model').value            = d.model       || '';
  document.getElementById('edit-ipv6').value             = d.ipv6        || '';
  document.getElementById('edit-desc').value             = d.description || '';
  editModal.show();
}

async function saveDevice() {
  const mac = document.getElementById('edit-mac').value;
  const body = {
    name:        document.getElementById('edit-name').value.trim(),
    model:       document.getElementById('edit-model').value.trim(),
    ipv6:        document.getElementById('edit-ipv6').value.trim(),
    description: document.getElementById('edit-desc').value.trim(),
  };
  try {
    await fetch(`/api/devices/${encodeURIComponent(mac)}`, {
      method: 'PATCH', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    editModal.hide();
    await loadDevices();
    showToast('Device updated', 'success');
  } catch(e) { showToast('Update failed', 'danger'); }
}

// block or unblock a device
async function toggleBlock(mac) {
  try {
    const res  = await fetch(`/api/devices/${encodeURIComponent(mac)}/block`, { method: 'POST' });
    const data = await res.json();
    await loadDevices();
    showToast(data.blocked ? 'Device blocked' : 'Device unblocked', 'success');
  } catch(e) { showToast('Action failed', 'danger'); }
}

// show toast notification
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.className = `toast align-items-center text-bg-${type} border-0`;
  document.getElementById('toast-msg').textContent = msg;
  toastEl.show();
}

// escape html special chars
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// page init - start with scan button disabled
document.getElementById('scan-btn').disabled = true;

</script>
</body>
</html>
